name = "js-hack-arena"
main = "worker/index.js"
compatibility_date = "2026-07-07"

# The browser client is still a static site. Cloudflare serves these assets,
# while the Worker handles server routes such as /api/* and /ws/*.
[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "404-page"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
