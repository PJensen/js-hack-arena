<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hack Arena</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:none;
        -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; background:#0b0f12; color:#fff;
                font-family:Inter,"Segoe UI",system-ui,-apple-system,sans-serif; }
    canvas { display:block; width:100%; height:100%; }
    #hud { position:fixed; top:12px; left:50%; transform:translateX(-50%);
           font-size:14px; color:rgba(255,255,255,0.7); text-align:center; z-index:40; }

    /* ── Joysticks ── */
    .joystick { position:fixed; bottom:40px; width:140px; height:140px; border-radius:50%;
                background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15); z-index:20; }
    .joystick-left  { left:40px; }
    .joystick-right { right:40px; }
    .joystick-knob  { position:absolute; width:56px; height:56px; border-radius:50%;
                      background:rgba(255,255,255,0.25); border:2px solid rgba(255,255,255,0.4);
                      top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
    .touch-dot { position:fixed; width:18px; height:18px; margin-left:-9px; margin-top:-9px;
                 border-radius:50%; pointer-events:none; display:none; z-index:30; }
    .touch-dot-left  { background:rgba(120,220,255,0.9); box-shadow:0 0 0 3px rgba(120,220,255,0.25); }
    .touch-dot-right { background:rgba(255,170,110,0.95); box-shadow:0 0 0 3px rgba(255,170,110,0.25); }
    .stick-readout { position:fixed; bottom:190px; min-width:180px; padding:8px 10px; border-radius:8px;
                     font-size:12px; line-height:1.35; background:rgba(0,0,0,0.5);
                     border:1px solid rgba(255,255,255,0.15); z-index:40; }
    #readout-left  { left:24px; }
    #readout-right { right:24px; text-align:right; }

    /* ── Spell bar ── */
    #spell-bar { position:fixed; bottom:200px; left:50%; transform:translateX(-50%);
                 display:flex; gap:8px; z-index:50; pointer-events:auto; }
    .spell-btn { width:52px; height:52px; border-radius:12px;
                 background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.2);
                 color:#fff; font-size:24px; line-height:52px; text-align:center;
                 cursor:pointer; transition:border-color 0.15s, background 0.15s; }
    .spell-btn.active { border-color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.15); }
    .spell-btn .spell-key { display:block; font-size:10px; line-height:1;
                            color:rgba(255,255,255,0.4); margin-top:-8px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">Hack Arena</div>
  <div id="zoom-readout" style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
    font:13px ui-monospace,monospace;color:rgba(255,255,255,0.5);z-index:40;
    background:rgba(0,0,0,0.4);padding:4px 12px;border-radius:6px;
    border:1px solid rgba(255,255,255,0.1)">zoom: —</div>
  <div class="stick-readout" id="readout-left">L stick idle</div>
  <div class="stick-readout" id="readout-right">R stick idle</div>
  <div class="joystick joystick-left" id="joystick-left"><div class="joystick-knob" id="knob-left"></div></div>
  <div class="joystick joystick-right" id="joystick-right"><div class="joystick-knob" id="knob-right"></div></div>
  <div class="touch-dot touch-dot-left" id="touch-left"></div>
  <div class="touch-dot touch-dot-right" id="touch-right"></div>
  <div id="spell-bar">
    <div class="spell-btn active" data-slot="0">&#x2744;<span class="spell-key">1</span></div>
    <div class="spell-btn" data-slot="1">&#x26A1;<span class="spell-key">2</span></div>
  </div>

<script>
  const ENABLE_SW = true;

  async function registerServiceWorker() {
    const isGithubPages = window.location.hostname.endsWith('github.io');
    if (isGithubPages) {
      if ('serviceWorker' in navigator) {
        try { const regs = await navigator.serviceWorker.getRegistrations(); for (const reg of regs) await reg.unregister(); }
        catch (err) { console.warn('SW unregister on github.io failed', err); }
      }
      return;
    }
    if (!ENABLE_SW || !('serviceWorker' in navigator) || !window.isSecureContext) return;
    try {
      const reg = await navigator.serviceWorker.register(new URL('sw.js', location.href).pathname, {
        scope: new URL('.', location.href).pathname, updateViaCache: 'none',
      });
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      reg.addEventListener('updatefound', () => {
        const ins = reg.installing; if (!ins) return;
        ins.addEventListener('statechange', () => {
          if (ins.state === 'installed' && navigator.serviceWorker.controller) ins.postMessage({ type: 'SKIP_WAITING' });
        });
      });
    } catch (err) {
      if (err?.name !== 'AbortError') console.warn('SW registration failed', err);
    }
  }
  window.addEventListener('load', () => registerServiceWorker());
</script>

<script type="module">
// ── Boot: imports ───────────────────────────────────────────────
import { World, composeScheduler } from './src/lib/ecs-js/index.js';
import { generateCave, CaveProfile } from './src/rules/geometry/caveGen.js';
import { resolveSeed } from './src/runtime/rng.js';
import { createFixedTickLoop } from './src/runtime/fixedLoop.js';
import { createInputRouter } from './src/input/InputRouter.js';
import { createCamera } from './src/display/camera/controller.js';
import { bakeCavePass } from './src/display/passes/cavePass.js';
import { createCarver } from './src/rules/geometry/carve.js';
import { createTorchPass } from './src/display/passes/torchPass.js';
import { ParticleFX } from './src/display/passes/vfx/particles/particlePool.js';
import { createRenderer } from './src/display/renderer.js';
import { createFloatTextPass } from './src/display/passes/floatText.js';
import { createBoltFx } from './src/display/passes/boltFx.js';
import { spawnPlayer, spawnCaster, spawnPotion, spawnBow, spawnSword } from './src/rules/spawner.js';
import { PlayerTag, Spellbook } from './src/rules/components/index.js';
import {
  createInputSystem, createMovementSystem, createAISystem,
  bumpSystem, createProjectileSystem, createDeathSystem, createCameraSystem,
  pickupSystem,
} from './src/rules/systems/index.js';

// ── Canvas + DOM ────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener('resize', resize); resize();

// ── Seed + cave ─────────────────────────────────────────────────
const { seed: SEED } = resolveSeed();
const caveData = generateCave({ seed: SEED, width: 2000, height: 2000, profile: CaveProfile.CAVERNS, spawnCount: 4 });
const { grid, bounds, spawns } = caveData;
const spawn = spawns[0];

// ── Pre-bake display ────────────────────────────────────────────
const caveBake  = bakeCavePass(caveData);
const torchPass = createTorchPass(grid);
const carve     = createCarver(grid, caveBake);

// ── Particle FX ─────────────────────────────────────────────────
const cam = createCamera();
cam.x = cam.targetX = spawn.x;
cam.y = cam.targetY = spawn.y;
cam.scale = cam.targetScale = 1.8;

const fx = new ParticleFX({ capacity: 2048, seedBase: SEED });
fx.worldToScreen = (x, y, size, out) => {
  out.x = (x - cam.x) * cam.scale + canvas.width * 0.5;
  out.y = (y - cam.y) * cam.scale + canvas.height * 0.5;
  out.size = size * cam.scale;
};

// ── Input ───────────────────────────────────────────────────────
const inputRouter = createInputRouter({
  leftBase:    document.getElementById('joystick-left'),
  leftKnob:    document.getElementById('knob-left'),
  leftMarker:  document.getElementById('touch-left'),
  rightBase:   document.getElementById('joystick-right'),
  rightKnob:   document.getElementById('knob-right'),
  rightMarker: document.getElementById('touch-right'),
  canvas,
});

// ── Spell bar (touch) ───────────────────────────────────────────
// Spell bar — intercept touches BEFORE InputRouter claims them
const spellBar = document.getElementById('spell-bar');
const spellBtns = document.querySelectorAll('.spell-btn');
spellBar.addEventListener('touchstart', (e) => {
  e.preventDefault();
  e.stopPropagation();
  const btn = e.target.closest('.spell-btn');
  if (!btn) return;
  const slot = Number(btn.dataset.slot);
  inputRouter._setSpellSlot(slot);
  spellBtns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}, { capture: true });
spellBar.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  e.stopPropagation();
  const btn = e.target.closest('.spell-btn');
  if (!btn) return;
  const slot = Number(btn.dataset.slot);
  inputRouter._setSpellSlot(slot);
  spellBtns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

// ── ECS world ───────────────────────────────────────────────────
const world = new World({ seed: SEED });
const runtimeEvents = { casts: 0 };

// ── Spawn entities ──────────────────────────────────────────────
const playerId = spawnPlayer(world, spawn.x, spawn.y);
world.add(playerId, PlayerTag);
spawnCaster(world, grid, spawn.x + 200, spawn.y + 150, playerId);

// ── System context (shared deps injected into system closures) ──
const sysCtx = { grid, fx, cam, inputRouter, playerId, carve };

// ── Register systems ────────────────────────────────────────────
world.system(createInputSystem(sysCtx),      'input');
world.system(createMovementSystem(sysCtx),   'simulate');
world.system(createAISystem(sysCtx),         'simulate');
world.system(bumpSystem,                     'simulate');
world.system(pickupSystem,                   'simulate');
world.system(createProjectileSystem(sysCtx), 'simulate');
world.system(createDeathSystem(sysCtx),      'simulate');
world.system(createCameraSystem(sysCtx),     'camera');
world.setScheduler(composeScheduler('input', 'simulate', 'camera'));

// ── Float text (damage numbers) ─────────────────────────────────
const floatText = createFloatTextPass();
world.on('damage.dealt', (e) => {
  const isHeal = e.amount < 0;
  floatText.add({
    x: e.x, y: e.y,
    text: isHeal ? '+' + Math.abs(e.amount) : '-' + e.amount,
    color: isHeal ? '#44ff66' : (e.target === playerId ? '#ff4444' : '#ffcc00'),
  });
});

// ── Loot drops + enemy respawn ──────────────────────────────────
import { Position as _Pos } from './src/rules/components/index.js';
world.on('entity.died', (e) => {
  // Drop a potion where the mob died (if position still accessible)
  // Note: entity is already destroyed, but deathSystem emits before destroy
  // We stash the position in the event — let's read it from the death system
});
// Patch: listen for mob death with position data
const _onDied = [];
world.on('entity.died.at', (e) => {
  // Always drop a potion
  spawnPotion(world, e.x + (Math.random() - 0.5) * 16, e.y + (Math.random() - 0.5) * 16, 25);
  // 20% chance bow, 20% chance sword
  const roll = Math.random();
  if (roll < 0.20) {
    spawnBow(world, e.x + (Math.random() - 0.5) * 20, e.y + (Math.random() - 0.5) * 20);
  } else if (roll < 0.40) {
    spawnSword(world, e.x + (Math.random() - 0.5) * 20, e.y + (Math.random() - 0.5) * 20, Math.floor(Math.random() * 3));
  }
  // Respawn a new caster somewhere else after a short delay
  setTimeout(() => {
    const px = world.get(playerId, _Pos);
    if (!px) return;
    const offset = 250 + Math.random() * 200;
    const angle = Math.random() * Math.PI * 2;
    spawnCaster(world, grid, px.x + Math.cos(angle) * offset, px.y + Math.sin(angle) * offset, playerId);
  }, 2000);
});

// ── Dynamic spell bar (rebuild when spells change) ───────────────
import { spells as spellCatalog } from './src/rules/data/spellCatalog.js';
function rebuildSpellBar() {
  if (!world.has(playerId, Spellbook)) return;
  const book = world.get(playerId, Spellbook);
  const bar = document.getElementById('spell-bar');
  bar.innerHTML = '';
  book.spells.forEach((spellId, i) => {
    const spell = spellCatalog[spellId];
    if (!spell) return;
    const btn = document.createElement('div');
    btn.className = 'spell-btn' + (i === book.activeIndex ? ' active' : '');
    btn.dataset.slot = i;
    btn.innerHTML = spell.glyph + '<span class="spell-key">' + (i + 1) + '</span>';
    bar.appendChild(btn);
  });
  // Re-bind touch
  bar.querySelectorAll('.spell-btn').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault(); e.stopPropagation();
      inputRouter._setSpellSlot(Number(btn.dataset.slot));
    }, { capture: true });
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault(); e.stopPropagation();
      inputRouter._setSpellSlot(Number(btn.dataset.slot));
    });
  });
}
world.on('item.pickup', () => rebuildSpellBar());

// ── Lightning bolt FX ────────────────────────────────────────────
const boltFx = createBoltFx();
world.on('spell:bolt', (e) => {
  boltFx.add(e.fromX, e.fromY, e.toX, e.toY, e.chain);
});

// ── Renderer ────────────────────────────────────────────────────
const renderFrame = createRenderer({
  canvas, ctx, cam, caveBake, torchPass, fx, world, SEED, runtimeEvents, floatText, boltFx,
  hud: {
    hud:         document.getElementById('hud'),
    readL:       document.getElementById('readout-left'),
    readR:       document.getElementById('readout-right'),
    zoomReadout: document.getElementById('zoom-readout'),
  },
  input: {
    leftStick:  inputRouter,
    rightStick: inputRouter,
    keyboardInput: () => {
      const o = inputRouter.getOutput();
      return { mx: o.intent.moveX, my: o.intent.moveY };
    },
  },
});

// ── Game loop (fixed tick + render) ─────────────────────────────
const ZOOM_MIN = 0.3, ZOOM_MAX = 6.0, ZOOM_STEP = 0.15;

const loop = createFixedTickLoop({
  tickHz: 60,
  simulate(dt) {
    // Sample input ONCE per tick — systems read via getOutput()
    const o = inputRouter.sample();
    if (o.zoomDelta) {
      cam.targetScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, cam.targetScale + o.zoomDelta * ZOOM_STEP));
    }
    // Stash spell switch on a shared object so inputSystem can read it
    sysCtx._lastInput = o;
    world.tick(dt);
  },
  render() {
    renderFrame();
    // Sync spell bar UI with active spell
    if (world.has(playerId, Spellbook)) {
      const sb = world.get(playerId, Spellbook);
      spellBtns.forEach((b, i) => b.classList.toggle('active', i === sb.activeIndex));
    }
  },
});

loop.start();
console.log(`Cave: seed=${SEED.toString(16)} grid=${grid.cols}x${grid.rows} spawns=${spawns.length}`);

addEventListener('beforeunload', () => {
  loop.stop();
  inputRouter.destroy();
});
</script>
</body>
</html>
