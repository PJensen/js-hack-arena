<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hack Arena</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:none;
        -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; background:#0b0f12; color:#fff;
                font-family:"Segoe UI",system-ui,sans-serif; }
    canvas { display:block; width:100%; height:100%; }
    #hud { position:fixed; top:12px; left:50%; transform:translateX(-50%);
           font-size:14px; color:rgba(255,255,255,0.7); text-align:center; z-index:40; }

    /* ── Joysticks ── */
    .joystick { position:fixed; bottom:40px; width:140px; height:140px; border-radius:50%;
                background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.15); z-index:20; }
    .joystick-left  { left:40px; }
    .joystick-right { right:40px; }
    .joystick-knob  { position:absolute; width:56px; height:56px; border-radius:50%;
                      background:rgba(255,255,255,0.25); border:2px solid rgba(255,255,255,0.4);
                      top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
    .touch-dot { position:fixed; width:18px; height:18px; margin-left:-9px; margin-top:-9px;
                 border-radius:50%; pointer-events:none; display:none; z-index:30; }
    .touch-dot-left  { background:rgba(120,220,255,0.9); box-shadow:0 0 0 3px rgba(120,220,255,0.25); }
    .touch-dot-right { background:rgba(255,170,110,0.95); box-shadow:0 0 0 3px rgba(255,170,110,0.25); }
    .stick-readout { position:fixed; bottom:190px; min-width:180px; padding:8px 10px; border-radius:8px;
                     font-size:12px; line-height:1.35; background:rgba(0,0,0,0.5);
                     border:1px solid rgba(255,255,255,0.15); z-index:40; }
    #readout-left  { left:24px; }
    #readout-right { right:24px; text-align:right; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">Hack Arena</div>
  <div class="stick-readout" id="readout-left">L stick idle</div>
  <div class="stick-readout" id="readout-right">R stick idle</div>
  <div class="joystick joystick-left" id="joystick-left"><div class="joystick-knob" id="knob-left"></div></div>
  <div class="joystick joystick-right" id="joystick-right"><div class="joystick-knob" id="knob-right"></div></div>
  <div class="touch-dot touch-dot-left" id="touch-left"></div>
  <div class="touch-dot touch-dot-right" id="touch-right"></div>

<script>
  const ENABLE_SW = true;

  async function registerServiceWorker() {
    if (!ENABLE_SW) return;
    if (!("serviceWorker" in navigator)) return;
    if (!window.isSecureContext) return;

    const swUrl = new URL('sw.js', window.location.href);
    const scopeUrl = new URL('.', window.location.href);

    try {
      const reg = await navigator.serviceWorker.register(swUrl.pathname, {
        scope: scopeUrl.pathname,
        updateViaCache: 'none',
      });

      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });

      reg.addEventListener('updatefound', () => {
        const installing = reg.installing;
        if (!installing) return;
        installing.addEventListener('statechange', () => {
          if (installing.state === 'installed' && navigator.serviceWorker.controller) {
            installing.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    } catch (err) {
      if (err && err.name === 'AbortError') {
        console.warn('SW registration aborted once; will retry on next load');
        return;
      }
      console.warn('SW registration failed', err);
    }
  }

  window.addEventListener('load', () => { registerServiceWorker(); });
</script>

<script type="module">
// ── Imports ────────────────────────────────────────────────────
import { World, RafLoop } from './src/lib/ecs-js/index.js';
import { Position, Velocity, Facing, Collider, Speed, Input, Actor, ActorKind, Health, FOV }
  from './src/rules/components/index.js';
import { generateCave, CaveProfile } from './src/rules/geometry/caveGen.js';
import { moveWithSlide } from './src/rules/geometry/sweep.js';
import { createCamera, updateCamera, applyCamera } from './src/display/camera/controller.js';
import { followEntity } from './src/display/camera/follow.js';
import { bakeCavePass } from './src/display/passes/cavePass.js';

// ── Canvas setup ───────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const hud    = document.getElementById('hud');
const readL  = document.getElementById('readout-left');
const readR  = document.getElementById('readout-right');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ── Generate cave ──────────────────────────────────────────────
const SEED = (Math.random() * 0xFFFFFFFF) >>> 0;
const caveData = generateCave({
  seed: SEED, width: 2400, height: 2400, profile: CaveProfile.CAVERNS, cellSize: 10, spawnCount: 4,
});
const { kernel, bounds, spawns, connectivity } = caveData;
const spawn = spawns[0];

// Pre-bake cave to offscreen canvas (one-time cost)
const caveBake = bakeCavePass(caveData);
console.log(`Cave: seed=${SEED.toString(16)} carves=${kernel.carves.length} spawns=${spawns.length} regionsRemoved=${connectivity.regionsRemoved}`);

// ── ECS world ──────────────────────────────────────────────────
const world = new World({ seed: SEED });
const runtimeEvents = { casts: 0 };
world.on('spell.cast', (payload) => { runtimeEvents.casts += 1; });

const playerId = world.create();
world.add(playerId, Position, { x: spawn.x, y: spawn.y });
world.add(playerId, Velocity, { vx: 0, vy: 0 });
world.add(playerId, Facing,   { angle: 0 });
world.add(playerId, Collider, { radius: 14 });
world.add(playerId, Speed,    { max: 200 });
world.add(playerId, Input);
world.add(playerId, Actor,    { kind: ActorKind.PLAYER, name: 'Player', glyph: '@' });
world.add(playerId, Health,   { hp: 100, maxHp: 100 });
world.add(playerId, FOV,      { distance: 220, angle: 1.4 });

// ── Camera ─────────────────────────────────────────────────────
const cam = createCamera();
cam.x = cam.targetX = spawn.x;
cam.y = cam.targetY = spawn.y;

// ── Joystick (reuse proven touch code) ─────────────────────────
function normalizeVector(x, y) {
  const len = Math.hypot(x, y);
  if (len < 0.0001) return { x:0, y:0, mag:0, angle:0 };
  const mag = Math.min(1, len);
  return { x: (x/len)*mag, y: (y/len)*mag, mag, angle: Math.atan2(y/len, x/len) };
}

class Joystick {
  constructor(baseEl, knobEl, markerEl) {
    this.base = baseEl; this.knob = knobEl; this.marker = markerEl;
    this.radius = baseEl.offsetWidth / 2;
    this.touchId = null; this.x = 0; this.y = 0; this.mag = 0; this.angle = 0;
  }
  get active() { return this.touchId !== null; }
  start(touch) { this.touchId = touch.identifier; this._update(touch); }
  _update(touch) {
    const rect = this.base.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = touch.clientX - cx, dy = touch.clientY - cy;
    const dist = Math.hypot(dx, dy);
    if (dist > this.radius) { dx = (dx/dist)*this.radius; dy = (dy/dist)*this.radius; }
    const n = normalizeVector(dx/this.radius, dy/this.radius);
    Object.assign(this, { x: n.x, y: n.y, mag: n.mag, angle: n.angle });
    this.knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    this.marker.style.left = touch.clientX + 'px';
    this.marker.style.top  = touch.clientY + 'px';
    this.marker.style.display = 'block';
  }
  end() {
    this.touchId = null; this.x = this.y = this.mag = this.angle = 0;
    this.knob.style.transform = 'translate(-50%,-50%)';
    this.marker.style.display = 'none';
  }
}

const leftStick  = new Joystick(document.getElementById('joystick-left'),  document.getElementById('knob-left'),  document.getElementById('touch-left'));
const rightStick = new Joystick(document.getElementById('joystick-right'), document.getElementById('knob-right'), document.getElementById('touch-right'));

document.addEventListener('touchstart', e => { e.preventDefault();
  for (const t of e.changedTouches) { const s = t.clientX < window.innerWidth/2 ? leftStick : rightStick; if (!s.active) s.start(t); }
}, { passive: false });
document.addEventListener('touchmove', e => { e.preventDefault();
  for (const t of e.changedTouches) { if (leftStick.touchId === t.identifier) leftStick._update(t); if (rightStick.touchId === t.identifier) rightStick._update(t); }
}, { passive: false });
function releaseTouches(touches) { for (const t of touches) { if (leftStick.touchId === t.identifier) leftStick.end(); if (rightStick.touchId === t.identifier) rightStick.end(); } }
document.addEventListener('touchend',    e => releaseTouches(e.changedTouches));
document.addEventListener('touchcancel', e => releaseTouches(e.changedTouches));

// ── Keyboard fallback (WASD + arrow aim) ───────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

function keyboardInput() {
  let mx = 0, my = 0;
  if (keys['w'] || keys['arrowup'])    my -= 1;
  if (keys['s'] || keys['arrowdown'])  my += 1;
  if (keys['a'] || keys['arrowleft'])  mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  const len = Math.hypot(mx, my);
  if (len > 1) { mx /= len; my /= len; }
  return { mx, my };
}

// ── Game loop (RafLoop adapter) ───────────────────────────────
let castEventCooldown = 0;

function simulateFrame(dt) {
  // --- Input → ECS ---
  const inp  = world.get(playerId, Input);
  const kb   = keyboardInput();
  inp.moveX  = leftStick.active  ? leftStick.x  : kb.mx;
  inp.moveY  = leftStick.active  ? leftStick.y  : kb.my;
  inp.aimX   = rightStick.active ? rightStick.x : 0;
  inp.aimY   = rightStick.active ? rightStick.y : 0;

  castEventCooldown -= dt;
  if (rightStick.active && (Math.abs(inp.aimX) > 0.1 || Math.abs(inp.aimY) > 0.1) && castEventCooldown <= 0) {
    castEventCooldown = 0.12;
    world.emit('spell.cast', { id: playerId, x: inp.aimX, y: inp.aimY, t: performance.now() });
  }

  // --- Movement system ---
  const spd  = world.get(playerId, Speed);
  const vel  = world.get(playerId, Velocity);
  const pos  = world.get(playerId, Position);
  const col  = world.get(playerId, Collider);
  const fac  = world.get(playerId, Facing);

  vel.vx = inp.moveX * spd.max;
  vel.vy = inp.moveY * spd.max;

  if (Math.abs(inp.aimX) > 0.1 || Math.abs(inp.aimY) > 0.1) {
    fac.angle = Math.atan2(inp.aimY, inp.aimX);
  } else if (Math.abs(vel.vx) > 1 || Math.abs(vel.vy) > 1) {
    fac.angle = Math.atan2(vel.vy, vel.vx);
  }

  const mdx = vel.vx * dt;
  const mdy = vel.vy * dt;
  if (Math.abs(mdx) > 0.01 || Math.abs(mdy) > 0.01) {
    const moved = moveWithSlide(kernel, pos.x, pos.y, mdx, mdy, col.radius);
    pos.x = moved.x;
    pos.y = moved.y;
  }

  followEntity(cam, pos, dt);
  updateCamera(cam, dt);
}

function renderFrame() {
  const inp = world.get(playerId, Input);
  const kb = keyboardInput();
  const pos = world.get(playerId, Position);
  const col = world.get(playerId, Collider);
  const fac = world.get(playerId, Facing);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0b0f12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  applyCamera(ctx, cam, canvas);
  ctx.drawImage(caveBake.canvas, 0, 0);

  ctx.beginPath();
  ctx.arc(pos.x, pos.y, col.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#193447';
  ctx.fill();
  ctx.strokeStyle = '#6fd';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#cfe8ff';
  ctx.font = `bold ${Math.floor(col.radius * 1.4)}px ui-monospace, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('@', pos.x, pos.y + 1);

  const aimLen = col.radius + 14;
  ctx.beginPath();
  ctx.moveTo(pos.x + Math.cos(fac.angle) * col.radius, pos.y + Math.sin(fac.angle) * col.radius);
  ctx.lineTo(pos.x + Math.cos(fac.angle) * aimLen, pos.y + Math.sin(fac.angle) * aimLen);
  ctx.strokeStyle = '#8fe';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  hud.textContent = 'Hack Arena  seed:' + SEED.toString(16) + '  spawns:' + spawns.length + '  casts:' + runtimeEvents.casts;
  readL.textContent = leftStick.active
    ? `L x:${inp.moveX.toFixed(2)} y:${inp.moveY.toFixed(2)}`
    : (Math.abs(kb.mx) + Math.abs(kb.my) > 0 ? `KB ${kb.mx},${kb.my}` : 'L stick idle');
  readR.textContent = rightStick.active
    ? `R x:${inp.aimX.toFixed(2)} y:${inp.aimY.toFixed(2)}`
    : 'R stick idle';
}

const loopWorld = {
  step(dt) {
    simulateFrame(dt);
  }
};

const rafLoop = RafLoop.realtime(loopWorld)
  .maxDt(0.05)
  .render(() => renderFrame())
  .start();

window.addEventListener('beforeunload', () => {
  rafLoop.stop();
});
</script>
</body>
</html>
