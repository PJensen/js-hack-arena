<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hack Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .joystick {
            position: fixed;
            bottom: 40px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .joystick-left {
            left: 40px;
        }

        .joystick-right {
            right: 40px;
        }

        .joystick-knob {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div id="hud">Hack Arena</div>

    <div class="joystick joystick-left" id="joystick-left">
        <div class="joystick-knob" id="knob-left"></div>
    </div>

    <div class="joystick joystick-right" id="joystick-right">
        <div class="joystick-knob" id="knob-right"></div>
    </div>

    <script>
        // --- Canvas setup ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Joystick controller ---
        class Joystick {
            constructor(baseEl, knobEl) {
                this.base = baseEl;
                this.knob = knobEl;
                this.radius = baseEl.offsetWidth / 2;
                this.x = 0; // normalized -1..1
                this.y = 0;
                this.touchId = null;
            }

            get active() {
                return this.touchId !== null;
            }

            handleStart(touch) {
                this.touchId = touch.identifier;
                this.update(touch);
            }

            handleMove(touch) {
                this.update(touch);
            }

            handleEnd() {
                this.touchId = null;
                this.x = 0;
                this.y = 0;
                this.knob.style.transform = 'translate(-50%, -50%)';
            }

            update(touch) {
                const rect = this.base.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;

                let dx = touch.clientX - cx;
                let dy = touch.clientY - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = this.radius;

                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }

                this.x = dx / maxDist;
                this.y = dy / maxDist;

                this.knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            }
        }

        const leftStick = new Joystick(
            document.getElementById('joystick-left'),
            document.getElementById('knob-left')
        );
        const rightStick = new Joystick(
            document.getElementById('joystick-right'),
            document.getElementById('knob-right')
        );

        function getJoystickForTouch(touch) {
            const midX = window.innerWidth / 2;
            return touch.clientX < midX ? leftStick : rightStick;
        }

        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                const stick = getJoystickForTouch(touch);
                if (!stick.active) {
                    stick.handleStart(touch);
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (leftStick.touchId === touch.identifier) leftStick.handleMove(touch);
                if (rightStick.touchId === touch.identifier) rightStick.handleMove(touch);
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            for (const touch of e.changedTouches) {
                if (leftStick.touchId === touch.identifier) leftStick.handleEnd();
                if (rightStick.touchId === touch.identifier) rightStick.handleEnd();
            }
        });

        document.addEventListener('touchcancel', (e) => {
            for (const touch of e.changedTouches) {
                if (leftStick.touchId === touch.identifier) leftStick.handleEnd();
                if (rightStick.touchId === touch.identifier) rightStick.handleEnd();
            }
        });

        // --- Player state ---
        const player = {
            x: 0,
            y: 0,
            angle: 0,
            speed: 200,
            radius: 16,
        };

        function initPlayer() {
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
        }
        initPlayer();

        // --- Game loop ---
        let lastTime = performance.now();

        function loop(now) {
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Move with left stick
            if (Math.abs(leftStick.x) > 0.1 || Math.abs(leftStick.y) > 0.1) {
                player.x += leftStick.x * player.speed * dt;
                player.y += leftStick.y * player.speed * dt;
            }

            // Aim with right stick
            if (Math.abs(rightStick.x) > 0.1 || Math.abs(rightStick.y) > 0.1) {
                player.angle = Math.atan2(rightStick.y, rightStick.x);
            }

            // Keep player in bounds
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // --- Render ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            const gridSize = 48;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Player body
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#4fc3f7';
            ctx.fill();
            ctx.strokeStyle = '#81d4fa';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Aim direction indicator
            const aimLen = player.radius + 14;
            ctx.beginPath();
            ctx.moveTo(
                player.x + Math.cos(player.angle) * player.radius,
                player.y + Math.sin(player.angle) * player.radius
            );
            ctx.lineTo(
                player.x + Math.cos(player.angle) * aimLen,
                player.y + Math.sin(player.angle) * aimLen
            );
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();

            // HUD: show stick values for debug
            const hud = document.getElementById('hud');
            hud.textContent = `Hack Arena — Move: (${leftStick.x.toFixed(2)}, ${leftStick.y.toFixed(2)}) Aim: (${rightStick.x.toFixed(2)}, ${rightStick.y.toFixed(2)})`;

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
